services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cashier_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cashier_analytics"]
      interval: 5s
      timeout: 5s
      retries: 20
  api:
    build: .
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  postgres-data:
